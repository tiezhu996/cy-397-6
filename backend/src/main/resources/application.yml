spring:
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:mysql}:3306/${MYSQL_DATABASE:contractapi}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: ${MYSQL_USER:contract_user}
    password: ${MYSQL_PASSWORD:contract_pass}
  jackson:
    default-property-inclusion: non_null
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
server:
  port: 8080
app:
  jwt-secret: ${JWT_SECRET:dev_secret}
